name: WaveLog Oracle — Pronostico Diario
on:
  schedule:
    # Se ejecuta a las 07:00 UTC y 17:00 UTC (09:00 y 19:00 en España)
    - cron: '0 7,17 * * *'
  workflow_dispatch:
jobs:
  run-oracle:
    name: Calcular y guardar pronostico IA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Solucion nativa para el error de WebSockets

      - name: Instalar dependencias
        run: npm install @supabase/supabase-js

      - name: Ejecutar Oracle
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node oracle.mjs
