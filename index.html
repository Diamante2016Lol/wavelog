<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>🌊 WaveLog — Diario de Surf Colaborativo</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: {
        syne: ['Syne', 'sans-serif'],
        dm:   ['DM Sans', 'sans-serif'],
        mono: ['JetBrains Mono', 'monospace'],
      }}}
    }
  </script>

  <style>
    :root {
      --bg: #030e1b; --surface: #071828; --card: rgba(6, 24, 46, 0.8);
      --border: rgba(20, 184, 166, 0.2); --teal: #14b8a6; --teal-light: #2dd4bf;
      --sky: #0ea5e9; --foam: #dff0ef; --muted: #4a7a8a;
    }

    body {
      background-color: var(--bg); color: var(--foam);
      background-image: radial-gradient(circle at top right, #0c2b4a, #030e1b);
      background-attachment: fixed;
    }

    .glass { background: var(--card); backdrop-filter: blur(12px); border: 1px solid var(--border); }
    .neon-text { text-shadow: 0 0 15px rgba(20, 184, 166, 0.4); }
    
    input, select, textarea {
      background: rgba(0,0,0,0.3) !important; border: 1px solid var(--border) !important;
      color: white !important; border-radius: 12px !important;
    }

    .tab-active { color: var(--teal); border-bottom: 2px solid var(--teal); }
    
    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    .model-dot { width: 8px; height: 8px; border-radius: 2px; }
  </style>
</head>
<body class="min-h-screen pb-12">

  <header class="pt-8 pb-6 px-6 max-w-5xl mx-auto flex justify-between items-end">
    <div>
      <h1 class="font-syne text-4xl font-800 tracking-tighter text-white neon-text">WaveLog</h1>
      <p class="font-dm text-teal-400 font-medium tracking-wide text-sm uppercase">Barcelona Surf Ensemble</p>
    </div>
    <div class="text-right hidden sm:block">
      <div id="header-temp" class="font-syne text-2xl font-700">--°</div>
      <div class="text-[10px] text-muted font-mono uppercase">Open-Meteo Realtime</div>
    </div>
  </header>

  <nav class="max-w-5xl mx-auto px-6 mb-8 flex gap-8 border-b border-white/5">
    <button onclick="switchTab('forecast')" id="tab-forecast" class="pb-3 font-syne font-700 text-sm tracking-widest uppercase tab-active">Pronóstico IA</button>
    <button onclick="switchTab('journal')" id="tab-journal" class="pb-3 font-syne font-700 text-sm tracking-widest uppercase text-muted">Diario de Sesiones</button>
    <button onclick="switchTab('admin')" id="tab-admin" class="pb-3 font-syne font-700 text-sm tracking-widest uppercase text-muted">Admin</button>
  </nav>

  <main class="max-w-5xl mx-auto px-4 sm:px-6">

    <div id="section-forecast" class="space-y-6">
      
      <div class="glass rounded-3xl p-6 relative overflow-hidden">
        <div class="absolute top-0 right-0 p-4 opacity-10 font-syne text-6xl font-800 italic">LIVE</div>
        <div class="flex flex-wrap gap-8 items-center">
          <div>
            <div class="text-[10px] text-muted font-mono uppercase mb-1">Boya de Barcelona</div>
            <div id="portus-hs" class="font-syne text-4xl font-800">--m</div>
          </div>
          <div class="grid grid-cols-2 gap-x-6 gap-y-1">
            <div class="text-[10px] text-muted font-mono">PERIODO</div>
            <div id="portus-tp" class="text-sm font-bold">--s</div>
            <div class="text-[10px] text-muted font-mono">DIRECCIÓN</div>
            <div id="portus-dir" class="text-sm font-bold">--°</div>
          </div>
          <div class="ml-auto text-right">
            <div id="portus-time" class="text-[10px] text-muted font-mono uppercase">Sincronizando...</div>
          </div>
        </div>
      </div>

      <div id="oracle-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="col-span-full py-12 text-center text-muted font-mono animate-pulse">Consultando al Oráculo...</div>
      </div>
    </div>

    <div id="section-journal" class="hidden space-y-6">
      <div class="glass rounded-3xl p-6">
        <h3 class="font-syne text-xl font-700 mb-6">Registrar Nueva Sesión</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mb-6">
          <div class="space-y-1">
            <label class="text-[10px] font-mono text-muted uppercase">Surfer</label>
            <input type="text" id="input-surfer" class="w-full px-4 py-3 text-sm focus:ring-1 focus:ring-teal-500 outline-none transition-all" placeholder="Nombre">
          </div>
          <div class="space-y-1">
            <label class="text-[10px] font-mono text-muted uppercase">Fecha</label>
            <input type="date" id="input-date" class="w-full px-4 py-3 text-sm focus:ring-1 focus:ring-teal-500 outline-none">
          </div>
          <div class="space-y-1">
            <label class="text-[10px] font-mono text-muted uppercase">Hora</label>
            <input type="time" id="input-time" class="w-full px-4 py-3 text-sm focus:ring-1 focus:ring-teal-500 outline-none">
          </div>
          <div class="space-y-1">
            <label class="text-[10px] font-mono text-muted uppercase">Altura Percibida (m)</label>
            <input type="number" id="input-hs" step="0.1" class="w-full px-4 py-3 text-sm focus:ring-1 focus:ring-teal-500 outline-none" placeholder="Ej: 0.8">
          </div>
          <div class="space-y-1">
            <label class="text-[10px] font-mono text-muted uppercase">Calidad del Baño</label>
            <select id="input-rating" class="w-full px-4 py-3 text-sm focus:ring-1 focus:ring-teal-500 outline-none">
              <option value="5">⭐⭐⭐⭐⭐ Épico</option>
              <option value="4">⭐⭐⭐⭐ Muy Bueno</option>
              <option value="3" selected>⭐⭐⭐ Cumplidor</option>
              <option value="2">⭐⭐ Raspado</option>
              <option value="1">⭐ Plato / Chusta</option>
            </select>
          </div>
          <div class="space-y-1 sm:col-span-2 md:col-span-1">
            <label class="text-[10px] font-mono text-muted uppercase">Spot</label>
            <input type="text" id="input-spot" class="w-full px-4 py-3 text-sm focus:ring-1 focus:ring-teal-500 outline-none" value="Barcelona (Poblenou)">
          </div>
        </div>
        <div class="space-y-1 mb-6">
          <label class="text-[10px] font-mono text-muted uppercase">Comentarios / Notas del parte</label>
          <textarea id="input-notes" class="w-full px-4 py-3 text-sm h-24 focus:ring-1 focus:ring-teal-500 outline-none" placeholder="¿Cómo rompía? ¿Mucho viento?"></textarea>
        </div>
        <button onclick="saveSession()" class="w-full py-4 bg-teal-500 hover:bg-teal-400 text-bg font-syne font-800 text-sm uppercase tracking-widest rounded-2xl transition-all">
          Guardar Sesión en WaveLog
        </button>
      </div>

      <div id="sessions-list" class="space-y-4">
        </div>
    </div>

    <div id="section-admin" class="hidden space-y-6">
      <div class="glass rounded-3xl p-6">
        <h3 class="font-syne text-xl font-700 mb-4">Panel de Control</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <button onclick="adminLimpiarForecast()" class="p-4 border border-red-500/30 bg-red-500/5 hover:bg-red-500/10 text-red-400 font-mono text-[10px] uppercase rounded-xl transition-all">
            Limpiar Pronósticos Antiguos
          </button>
          <a href="02_admin_entrenamiento.html" class="p-4 border border-teal-500/30 bg-teal-500/5 hover:bg-teal-500/10 text-teal-400 font-mono text-[10px] uppercase rounded-xl text-center">
            Módulo de Entrenamiento IA
          </a>
        </div>
        <div id="admin-log" class="mt-6 font-mono text-[10px] text-muted bg-black/40 p-4 rounded-xl h-32 overflow-y-auto">
          > Sistema listo para monitorización...
        </div>
      </div>
    </div>

  </main>

  <div id="toast" class="px-6 py-3 rounded-full glass font-syne font-700 text-xs text-white z-50 shadow-2xl">
    Mensaje de sistema
  </div>

  <script>
    // CONFIGURACIÓN SUPABASE
    const SB_URL = "TU_URL_SUPABASE"; 
    const SB_KEY = "TU_ANON_KEY"; 
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let oracleData = null;

    // =========================================================================
    // NAVEGACIÓN
    // =========================================================================
    function switchTab(tab) {
      const sections = ['forecast', 'journal', 'admin'];
      sections.forEach(s => {
        document.getElementById(`section-${s}`).classList.add('hidden');
        document.getElementById(`tab-${s}`).classList.remove('tab-active');
        document.getElementById(`tab-${s}`).classList.add('text-muted');
      });
      document.getElementById(`section-${tab}`).classList.remove('hidden');
      document.getElementById(`tab-${tab}`).classList.add('tab-active');
      document.getElementById(`tab-${tab}`).classList.remove('text-muted');

      if (tab === 'journal') fetchSessions();
      if (tab === 'forecast') renderOracle();
    }

    // =========================================================================
    // BOYA REAL (PORTUS / OPEN-METEO)
    // =========================================================================
    async function fetchPortusData() {
      try {
        // Usamos Open-Meteo como fuente de temperatura y "live" para Hs aproximado
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=41.38&longitude=2.15&current=temperature_2m,relative_humidity_2m&marine=wave_height,wave_period,wave_direction');
        const mRes = await fetch('https://marine-api.open-meteo.com/v1/marine?latitude=41.38&longitude=2.15&current=wave_height,wave_period,wave_direction');
        
        const data = await res.json();
        const marine = await mRes.json();

        document.getElementById('header-temp').textContent = Math.round(data.current.temperature_2m) + '°';
        document.getElementById('portus-hs').textContent = marine.current.wave_height.toFixed(2) + 'm';
        document.getElementById('portus-tp').textContent = marine.current.wave_period + 's';
        document.getElementById('portus-dir').textContent = marine.current.wave_direction + '°';
        document.getElementById('portus-time').textContent = 'Live: ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      } catch (e) {
        console.error("Error Boya:", e);
      }
    }

    // =========================================================================
    // EL ORÁCULO (PRONÓSTICO)
    // =========================================================================
    async function fetchOracle() {
      const now = new Date().toISOString();
      const { data, error } = await supabaseClient
        .from('forecast_ai')
        .select('*')
        .gte('timestamp', now)
        .order('timestamp', { ascending: true })
        .limit(48);

      if (error) {
        adminLog("Error Oracle: " + error.message);
        return;
      }
      oracleData = data;
      renderOracle();
    }

    function renderOracle() {
      if (!oracleData) return;
      const grid = document.getElementById('oracle-grid');
      
      // Agrupamos por días
      const days = {};
      oracleData.forEach(f => {
        const d = f.forecast_date;
        if (!days[d]) days[d] = [];
        days[d].push(f);
      });

      let html = '';
      Object.keys(days).forEach(date => {
        html += `<div class="col-span-full mt-8 mb-2 px-2 flex items-center gap-4">
                  <h4 class="font-syne font-800 text-xs uppercase tracking-[0.2em] text-teal-500">${formatDateLabel(date)}</h4>
                  <div class="h-[1px] flex-1 bg-white/5"></div>
                 </div>`;
        
        days[date].forEach(f => {
          html += renderForecastCard(f);
        });
      });

      grid.innerHTML = html;
    }

    function renderForecastCard(f) {
      const q = f.quality_score || 3;
      const hs = f.hs_ai || 0;
      const time = String(f.forecast_hour).padStart(2, '0') + ':00';
      
      // Cálculo de escala para las barras
      const maxVal = 2.0; 
      const getW = (v) => Math.min((v / maxVal) * 100, 100) + '%';

      return `
        <div class="glass rounded-2xl p-5 flex flex-col justify-between transition-all hover:border-teal-500/40 group">
          <div class="flex justify-between items-start mb-4">
            <div>
              <div class="text-[10px] font-mono text-muted uppercase tracking-widest">${time}</div>
              <div class="font-syne text-2xl font-800 text-white group-hover:text-teal-400 transition-colors">${hs.toFixed(2)}m</div>
            </div>
            <div class="text-right">
              <div class="flex gap-0.5 mb-1">${'⭐'.repeat(q)}</div>
              <div class="text-[10px] font-mono text-muted uppercase">${f.tp_ai || 0}s | ${f.dir_ai || 0}°</div>
            </div>
          </div>
          
          <div class="space-y-2">
            ${renderMiniBar('IBI', f.ibi_hs, '#14b8a6', getW(f.ibi_hs))}
            ${renderMiniBar('ECM', f.ecmwf_hs, '#0ea5e9', getW(f.ecmwf_hs))}
            ${renderMiniBar('GFS', f.gfs_hs, '#7c3aed', getW(f.gfs_hs))}
            ${renderMiniBar('ICO', f.icon_hs, '#f59e0b', getW(f.icon_hs))}
          </div>
        </div>
      `;
    }

    function renderMiniBar(label, val, color, width) {
      return `
        <div class="flex items-center gap-3">
          <div class="text-[8px] font-mono text-muted w-6">${label}</div>
          <div class="flex-1 h-1 bg-white/5 rounded-full overflow-hidden">
            <div class="h-full rounded-full" style="width: ${width}; background: ${color}; opacity: 0.8"></div>
          </div>
          <div class="text-[8px] font-mono text-white/40 w-6 text-right">${val?.toFixed(1) || 0}</div>
        </div>
      `;
    }

    // =========================================================================
    // DIARIO DE SESIONES
    // =========================================================================
    async function saveSession() {
      const session = {
        surfer_name: document.getElementById('input-surfer').value,
        datetime: `${document.getElementById('input-date').value}T${document.getElementById('input-time').value}`,
        waveHeight: parseFloat(document.getElementById('input-hs').value),
        rating: parseInt(document.getElementById('input-rating').value),
        spot: document.getElementById('input-spot').value,
        notes: document.getElementById('input-notes').value
      };

      if (!session.surfer_name || isNaN(session.waveHeight)) {
        showToast("Faltan campos obligatorios", true);
        return;
      }

      const { error } = await supabaseClient.from('sessions').insert([session]);
      if (error) {
        showToast("Error al guardar", true);
        adminLog("Error Guardar: " + error.message);
      } else {
        showToast("Sesión guardada en el WaveLog");
        localStorage.setItem('wavelog_username', session.surfer_name);
        fetchSessions();
        // Reset campos
        document.getElementById('input-hs').value = '';
        document.getElementById('input-notes').value = '';
      }
    }

    async function fetchSessions() {
      const { data, error } = await supabaseClient
        .from('sessions')
        .select('*')
        .order('datetime', { ascending: false })
        .limit(10);

      if (error) return;
      const list = document.getElementById('sessions-list');
      list.innerHTML = data.map(s => `
        <div class="glass rounded-2xl p-5 border-l-4 border-l-teal-500">
          <div class="flex justify-between items-start mb-2">
            <div>
              <span class="font-syne font-700 text-sm">${s.surfer_name}</span>
              <span class="text-[10px] text-muted font-mono ml-2 uppercase">${new Date(s.datetime).toLocaleDateString()}</span>
            </div>
            <div class="text-teal-400 font-syne font-800">${s.waveHeight.toFixed(1)}m</div>
          </div>
          <div class="text-xs text-slate-300 mb-3">${'⭐'.repeat(s.rating)} en ${s.spot}</div>
          <p class="text-xs text-muted italic font-dm leading-relaxed">"${s.notes || 'Sin comentarios.'}"</p>
        </div>
      `).join('');
    }

    // =========================================================================
    // ADMIN
    // =========================================================================
    function adminLog(msg) {
      const log = document.getElementById('admin-log');
      const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
      log.innerHTML = `> [${time}] ${msg}<br>` + log.innerHTML;
    }

    async function adminLimpiarForecast() {
      if (!confirm('Borrar todos los pronósticos anteriores a hoy. Esta acción es irreversible.')) return;
      const hoy = new Date().toISOString().split('T')[0];
      const { error } = await supabaseClient.from('forecast_ai').delete().lt('forecast_date', hoy);
      if (error) adminLog('ERROR: ' + error.message);
      else {
        adminLog('Pronósticos antiguos eliminados.');
        fetchOracle();
      }
    }

    // =========================================================================
    // UTILIDADES
    // =========================================================================
    function formatDateLabel(dateStr) {
      const options = { weekday: 'long', day: 'numeric', month: 'short' };
      const d = new Date(dateStr);
      return d.toLocaleDateString('es-ES', options);
    }

    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = isError ? '#ef4444' : '#14b8a6';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // INICIALIZACIÓN
    const savedName = localStorage.getItem('wavelog_username');
    if (savedName) document.getElementById('input-surfer').value = savedName;
    document.getElementById('input-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('input-time').value = new Date().toTimeString().slice(0, 5);

    fetchPortusData();
    fetchOracle();
    setInterval(fetchPortusData, 300000); // Actualizar boya cada 5 min
  </script>
</body>
</html>
